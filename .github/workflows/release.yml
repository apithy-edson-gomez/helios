# Release workflow — tag, release notes, milestone, GitHub Packages publish
name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.2.3)'
        required: true
        type: string

permissions:
  contents: write
  packages: write
  issues: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: 22

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      prerelease: ${{ steps.version.outputs.prerelease }}

    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="v${{ inputs.version }}"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          # Detect pre-release (contains -rc, -beta, -alpha, etc.)
          if [[ "$VERSION" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if ! echo "$VERSION" | grep -P '^\d+\.\d+\.\d+' > /dev/null; then
            echo "ERROR: Invalid version format: $VERSION"
            exit 1
          fi
          echo "Releasing: ${{ steps.version.outputs.tag }} (pre-release: ${{ steps.version.outputs.prerelease }})"

  test-and-build:
    name: Test & build
    runs-on: ubuntu-latest
    needs: prepare

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - run: npm test

      - run: npm run build

      - name: Verify bundle
        run: |
          node -e "
            const assert = require('assert');
            const h = require('./dist/helios.cjs');
            console.log('Exports:', Object.keys(h).length);
            assert.ok(Object.keys(h).length >= 200);
          "

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  milestone:
    name: Create milestone
    runs-on: ubuntu-latest
    needs: [prepare, test-and-build]
    if: ${{ needs.prepare.outputs.prerelease == 'false' }}

    steps:
      - name: Create and close milestone
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          REPO="${{ github.repository }}"
          TITLE="v$VERSION"

          # Check if milestone exists
          EXISTING=$(gh api "/repos/$REPO/milestones" --jq ".[] | select(.title == \"$TITLE\") | .number" 2>/dev/null || echo "")

          if [[ -z "$EXISTING" ]]; then
            echo "Creating milestone: $TITLE"
            MILESTONE=$(gh api "/repos/$REPO/milestones" \
              --method POST \
              --field title="$TITLE" \
              --field description="Release $TITLE" \
              --field due_on="$(date -u -d '+7 days' +'%Y-%m-%dT%H:%M:%SZ')" \
              --jq '.number')
            echo "Created milestone #$MILESTONE"
          else
            echo "Milestone already exists: #$EXISTING"
            MILESTONE=$EXISTING
          fi

  release:
    name: Create release
    runs-on: ubuntu-latest
    needs: [prepare, test-and-build]

    steps:
      - uses: actions/checkout@v4

      - name: Generate release notes
        id: release_notes
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.prepare.outputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          # Generate release notes using GitHub's API
          NOTES=$(gh api "/repos/$REPO/releases/generate-notes" \
            --method POST \
            --field tag_name="$TAG" \
            --jq '.body' 2>/dev/null || echo "Release $TAG")

          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.prepare.outputs.tag }}
          VERSION: ${{ needs.prepare.outputs.version }}
          PRERELEASE: ${{ needs.prepare.outputs.prerelease }}
          NOTES: ${{ steps.release_notes.outputs.notes }}
        run: |
          # Create the tag if this was a workflow_dispatch
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            git tag "$TAG" "${{ github.sha }}"
            git push origin "$TAG"
          fi

          # Read notes from file to avoid escaping issues
          echo "Creating release: $TAG"
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "$NOTES" \
            --target "${{ github.sha }}" \
            $([ "$PRERELEASE" == "true" ] && echo "--prerelease") \
            $([ "$PRERELEASE" != "true" ] && echo "--latest")

  publish:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest
    needs: [prepare, test-and-build, release]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://npm.pkg.github.com
          cache: npm

      - name: Update version in package.json
        run: |
          git config user.name "Edson Gomez"
          git config user.email "apithy-edson-gomez@noreply.github.com"
          npm version ${{ needs.prepare.outputs.version }} --no-git-tag-version --allow-same-version

      - run: npm ci

      - run: npm run build

      - name: Configure .npmrc for GitHub Packages
        run: |
          echo "@apithy-edson-gomez:registry=https://npm.pkg.github.com" > .npmrc
          echo "//npm.pkg.github.com/:_authToken=\${NODE_AUTH_TOKEN}" >> .npmrc

      - name: Publish
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_REGISTRY: https://npm.pkg.github.com
